name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: QML syntax check
        run: npm run check
      - name: Typecheck (JSDoc)
        run: npm run typecheck
      - name: E2E acceptance recorded & fresh
        # The GUI harness can't run headless; verify a passing run was recorded for
        # the current effect/lib code (harness/acceptance.json). Re-run scripts/e2e.sh
        # to refresh it when this fails.
        run: npm run e2e:check
