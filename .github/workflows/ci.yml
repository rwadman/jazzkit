name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Unit tests
        run: npm test
      - name: QML syntax check
        run: npm run check
      - name: Typecheck (JSDoc)
        run: npm run typecheck
